{% extends 'base.html' %} 
{% block title %} Create New Blog {% endblock %} 

{% block content %}
<div class="container py-5">
  <div class="card border-0 shadow-lg mx-auto rounded-4 overflow-hidden" style="max-width: 700px; background: var(--card-bg);">
    <div class="p-4 text-center" style="background: linear-gradient(135deg, var(--primary-accent), #4f46e5);">
      <h3 class="fw-bold fw-semibold mb-1">Create Story</h3>
      <p class="fw-semibold opacity-75 small mb-0">Share your thoughts with the Inkspire community</p>
    </div>

    <div class="card-body px-4 px-md-5 pb-4 pb-md-5 pt-4 pt-md-4">
      <form method="POST" enctype="multipart/form-data" id="blogForm">
        
        <div class="mb-4 mt-0">
          <label class="form-label fw-semibold small mb-1">Blog Title</label>
          <input type="text" name="title" class="form-control form-control-lg custom-input shadow-sm" 
                 placeholder="Give your story a catchy title..." required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label fw-semibold small mb-1">Category</label>
            <select name="category" class="form-select custom-input shadow-sm" required>
              <option value="" disabled selected>Select a topic</option>
              <option value="Technology">Technology</option>
              <option value="Travel">Travel</option>
              <option value="Food">Food</option>
              <option value="Education">Education</option>
              <option value="Lifestyle">Lifestyle</option>
            </select>
          </div>

          <div class="col-md-6 mb-4">
            <label class="form-label fw-semibold small mb-1">Cover Image</label>
            <input type="file" name="image" id="imageInput" class="form-control custom-input shadow-sm" accept="image/*">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small mb-1">Content</label>
          <div class="rounded-3 overflow-hidden border shadow-sm" style="background: white;">
            <div id="editor" style="height: 350px; font-size: 1.1rem; border: none;"></div>
          </div>
          <input type="hidden" name="description" id="hiddenInput">
        </div>

        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm transition-hover">
          <i class="fa-solid fa-paper-plane me-2"></i> Publish Story
        </button>
        
        <div class="text-center mt-3">
          <a href="/" class="text-muted small text-decoration-none hover-primary">Cancel and go back</a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  /* Quill styles remain consistent */
  .ql-toolbar.ql-snow {
    border: none !important;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0 !important;
    padding: 10px !important;
  }
  
  .ql-container.ql-snow {
    border: none !important;
    color: #1e293b;
  }

  .custom-input:focus {
    border-color: var(--primary-accent);
    box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25) !important;
  }

  .transition-hover {
    transition: all 0.3s ease;
  }

  .transition-hover:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
  }
</style>
{% endblock %}

{% block scripts %}
<script>
  var quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Tell your story...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'blockquote'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link', 'clean']
      ]
    }
  });

  document.querySelector('#blogForm').onsubmit = function() {
    var content = quill.root.innerHTML;
    if (quill.getText().trim().length === 0) {
      alert("Please write something for your blog content!");
      return false;
    }
    document.querySelector('#hiddenInput').value = content;
  };
</script>
{% endblock %}
