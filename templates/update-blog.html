{% extends 'base.html' %} 
{% block title %} Update Story {% endblock %} 

{% block content %}
<div class="container py-5">
  <div class="card border-0 shadow-lg mx-auto rounded-4 overflow-hidden" style="max-width: 700px; background: var(--card-bg);">
    
    <div class="p-4 text-center" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
      <h3 class="fw-bold text-white mb-1">✏️ Update Story</h3>
      <p class="text-white opacity-75 small mb-0">Refine your thoughts and improve your post</p>
    </div>

    <div class="card-body px-4 px-md-5 pb-4 pb-md-5 pt-4 pt-md-4">
      <form method="POST" enctype="multipart/form-data" id="updateForm">

        <div class="mb-4 mt-0">
          <label class="form-label fw-semibold small mb-1">Title</label>
          <input 
            type="text" 
            class="form-control form-control-lg custom-input shadow-sm" 
            name="title" 
            value="{{ blog.title }}" 
            placeholder="Enter blog title"
            required
          >
        </div>
        
          <div class="mb-4">
            <label class="form-label fw-semibold small mb-1">Category</label>
            <select name="category" class="form-select custom-input shadow-sm" required>
              <option value="" disabled selected>Select a topic</option>
              <option value="Technology">Technology</option>
              <option value="Travel">Travel</option>
              <option value="Food">Food</option>
              <option value="Education">Education</option>
              <option value="Lifestyle">Lifestyle</option>
            </select>
          </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small mb-1">Cover Image (Optional)</label>
          <input type="file" name="image" class="form-control custom-input shadow-sm" accept="image/*">
          <small class="text-muted mt-1 d-block">Leave empty to keep your current cover image.</small>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small mb-1">Description</label>
          <div class="rounded-3 overflow-hidden border shadow-sm" style="background: white;">
            <div id="editor" style="height: 300px; font-size: 1.1rem; border: none;"></div>
          </div>
          <input type="hidden" name="description" id="hiddenInput">
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <a href="/" class="btn btn-link text-decoration-none text-muted fw-semibold">
            <i class="fa fa-times me-1"></i> Cancel
          </a>
          <button type="submit" class="btn btn-warning px-5 py-2 rounded-pill fw-bold shadow-sm transition-hover">
            Update Story
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<style>
  /* Styling consistency with Create Page */
  .ql-toolbar.ql-snow {
    border: none !important;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0 !important;
    padding: 10px !important;
  }
  
  .ql-container.ql-snow {
    border: none !important;
    color: #1e293b;
  }

  .custom-input:focus {
    border-color: #f59e0b;
    box-shadow: 0 0 0 0.25rem rgba(245, 158, 11, 0.25) !important;
  }

  .transition-hover {
    transition: all 0.3s ease;
  }

  .transition-hover:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    box-shadow: 0 5px 15px rgba(217, 119, 6, 0.3) !important;
  }
</style>
{% endblock %}

{% block scripts %}
<script>
  // Initialize Quill
  var quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Update your blog...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'blockquote'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link', 'clean']
      ]
    }
  });

  // Load existing content safely
  quill.root.innerHTML = `{{ blog.description | safe }}`;

  // Form submission logic
  document.querySelector('#updateForm').onsubmit = function() {
    let content = quill.root.innerHTML.trim();

    // Quill default empty state check
    if (content === "<p><br></p>" || quill.getText().trim().length === 0) {
      alert("Description cannot be empty!");
      return false;
    }

    document.querySelector('#hiddenInput').value = content;
  };
</script>
{% endblock %}
